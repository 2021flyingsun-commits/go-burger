                { name: "Authentic", address: "東京都港区赤坂2-18-19 赤坂シャレーII 1F", lat: 35.6693, lng: 139.7388, hours: "11:00-15:30/17:30-21:30 (不定休)", payment: "現金のみ", website: "https://www.instagram.com/authentic_akasaka/" },
                { name: "AS Classics Diner 駒沢店", address: "東京都目黒区八雲5-9-22 1F", lat: 35.6250, lng: 139.6674, hours: "11:00-21:00 (定休:火)", payment: "VISA/MC/JCB/AMEX", website: "https://www.asclassics.com/" },
                { name: "Old New Diner", address: "東京都立川市錦町1-8-5 イーグル立川 1F", lat: 35.6983, lng: 139.4125, hours: "11:00-21:00 (定休:月)", payment: "VISA/MC/JCB/AMEX/PayPay", website: "https://oldnewdiner.jp/" },
                { name: "Burger&Milkshake Crane", address: "東京都千代田区外神田6-16-3 1F", lat: 35.7048, lng: 139.7714, hours: "11:30-24:00 (無休)", payment: "現金/PayPay", website: "https://www.instagram.com/crane.burger_and_milkshake/" },
                { name: "Viva la Burger", address: "東京都豊島区池袋2-59-5 酒井ビル 1F", lat: 35.7337, lng: 139.7081, hours: "11:30-16:00/17:30-21:00 (定休:火)", payment: "VISA/MC/JCB/AMEX/PayPay", website: "https://www.vivalaburger.jp/" },
                { name: "L.A.GARAGE", address: "東京都世田谷区池尻3-29-4 アルティザ池尻 1F", lat: 35.6496, lng: 139.6797, hours: "11:00-23:00 (不定休)", payment: "VISA/MC/JCB/AMEX/PayPay", website: "https://l-a-garage.com/" },
                { name: "Shake Tree Diner", address: "東京都墨田区向島1-23-11 東京ミズマチ E06", lat: 35.7126, lng: 139.8055, hours: "11:00-18:00 (定休:火)", payment: "VISA/MC/JCB/AMEX/Suica/PayPay", website: "https://shaketreetokyo.com/shake-tree-diner/" },
                { name: "The Good Vibes", address: "東京都港区海岸3-13-12 1F", lat: 35.6389, lng: 139.7523, hours: "11:30-21:00 (無休)", payment: "VISA/MC/JCB/AMEX/Suica/PayPay", website: "http://salt-group.jp/shop/goodvibes/" },
                { name: "フランクリン・アベニュー", address: "東京都品川区東五反田3-15-18", lat: 35.6268, lng: 139.7289, hours: "11:00-19:30 (定休:火)", payment: "現金のみ", website: "https://tabelog.com/tokyo/A1316/A131603/13001558/" },
                { name: "FUNGO 三宿本店", address: "東京都世田谷区下馬1-40-10", lat: 35.6394, lng: 139.6794, hours: "11:00-20:00 (不定休)", payment: "VISA/MC/JCB/AMEX/Suica/iD/PayPay", website: "https://www.fungo.com/m_top.html" },
                { name: "Hungry Heaven 目黒店", address: "東京都目黒区下目黒1-2-22 2F", lat: 35.6335, lng: 139.7135, hours: "11:00-16:00/17:30-23:00", payment: "VISA/MC/JCB/AMEX", website: "https://www.hungry-heaven.co.jp/" },
                { name: "DELIFUCIOUS", address: "東京都渋谷区宇田川町15-1 渋谷パルコ B1F", lat: 35.6617, lng: 139.6991, hours: "11:00-23:00 (施設に準ずる)", payment: "VISA/MC/JCB/AMEX/Suica/iD/PayPay", website: "https://delifucious.com/" },
                { name: "RUSTEAKS (ラステイクス)", address: "東京都渋谷区広尾5-22-3 広尾西川ビル B1F", lat: 35.6490, lng: 139.7194, hours: "11:30-15:00/18:00-22:30 (定休:月)", payment: "VISA/MC/JCB/AMEX", website: "https://rusteaks.jp/" },
                { name: "hide mode", address: "東京都文京区本郷2-30-10 コーラルコート 1F", lat: 35.7072, lng: 139.7610, hours: "11:30-14:00/17:00-20:00 (定休:日月)", payment: "現金のみ", website: "https://tabelog.com/tokyo/A1310/A131004/13222449/" }
            ];

            return data.map((s, i) => ({ id: i + 1, ...s }));
        };

        const TOKYO_SHOPS = generateTokyoShops();

        const OTHER_SHOPS = [];

        // Merge curated shops with FULL_TOKYO_SHOPS, filtering out chains and low-quality entries
        const CHAIN_NAMES = ['freshness burger', 'mcdonalds', 'mcdonald\'s', 'mos burger', 'carl\'s jr', 'cocos', 'family mart', 'famima',
            'lotteria', 'first kitchen', 'burger king', 'wendy\'s', 'nakau', 'matsuya', 'zetteria'];

        const extraShops = (typeof FULL_TOKYO_SHOPS !== 'undefined' ? FULL_TOKYO_SHOPS : []).filter(s => {
            const nameLower = s.name.toLowerCase();
            // Skip chains
            if (CHAIN_NAMES.some(chain => nameLower.includes(chain))) return false;
            // Skip entries with very poor coordinates (islands far from Tokyo)
            if (s.lat < 35.5 || s.lat > 35.85 || s.lng < 139.3 || s.lng > 139.95) return false;
            // Skip N/A entries with no useful data at all
            if (s.hours === 'N/A' && s.website === 'N/A') return false;
            return true;
        }).map((s, i) => ({
            id: 5000 + i,
            name: s.name,
            address: s.address || '東京都',
            lat: s.lat,
            lng: s.lng,
            hours: s.hours || 'N/A',
            payment: s.payment || 'N/A',
            website: (s.website && s.website !== 'N/A') ? s.website : null
        }));

        // Merge: curated first, then extra (deduplicate by name)
        const CURATED_SHOPS = [...TOKYO_SHOPS, ...OTHER_SHOPS];
        const curatedNames = new Set(CURATED_SHOPS.map(s => s.name.toLowerCase()));
        const mergedExtra = extraShops.filter(s => !curatedNames.has(s.name.toLowerCase()));
        const ALL_SHOPS = [...CURATED_SHOPS, ...mergedExtra];

        // --- ICONS ---
        const redIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        const yellowIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // --- COMPONENTS ---

        function MapView({ selectedPrefecture, onBack, visitedShops, toggleVisited }) {
            const mapRef = useRef(null);
            const [localMap, setLocalMap] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [currentLocationLayer, setCurrentLocationLayer] = useState(null);
            const markersRef = useRef(new Map());

            // Initialize Map
            useEffect(() => {
                if (!mapRef.current) return;

                if (localMap) {
                    localMap.remove();
                    setLocalMap(null);
                    markersRef.current.clear();
                }

                const map = L.map(mapRef.current, { zoomControl: false }).setView([selectedPrefecture.lat, selectedPrefecture.lng], 12);

                // CARTO Voyager - Clean, reliable, and better contrast for markers
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                    subdomains: 'abcd',
                    maxZoom: 20
                }).addTo(map);

                L.control.zoom({ position: 'topright' }).addTo(map);

                setLocalMap(map);

                return () => {
                    map.remove();
                };
            }, [selectedPrefecture]);

            // Filter & Update Markers
            useEffect(() => {
                if (!localMap) return;

                const markerLayer = L.layerGroup();
                markersRef.current.clear();

                // 1. All Shops (curated + extra from FULL_TOKYO_SHOPS)
                const curatedMatches = ALL_SHOPS.filter(shop =>
                    shop.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    shop.address.toLowerCase().includes(searchQuery.toLowerCase())
                );

                curatedMatches.forEach(shop => {
                    const isVisited = visitedShops.has(shop.id);
                    const marker = L.marker([shop.lat, shop.lng], {
                        icon: isVisited ? yellowIcon : redIcon,
                        zIndexOffset: 1000
                    });

                    const popupContent = document.createElement('div');
                    popupContent.className = "p-3 md:p-4 min-w-[240px]";
                    popupContent.innerHTML = `
                        <h3 class="text-xl font-black text-brand-900 mb-1 font-sans">${shop.name}</h3>
                        <p class="text-xs text-gray-500 mb-1 font-bold bg-gray-100 inline-block px-1 rounded">${shop.address}</p>
                        <div class="space-y-1 text-sm text-gray-700 border-t-2 border-brand-100 pt-2 my-2 font-medium">
                            <p class="flex items-center gap-2"><span class="text-brand-600">🕒</span> ${shop.hours}</p>
                            <p class="flex items-center gap-2"><span class="text-brand-600">💳</span> ${shop.payment}</p>
                            ${shop.website ? `<p class="flex items-center gap-2"><span class="text-brand-600">🔗</span> <a href="${shop.website}" target="_blank" rel="noopener noreferrer" class="text-brand-600 font-bold hover:underline">リンク</a></p>` : ''}
                        </div>
                        <div class="mt-4 flex items-center gap-3 bg-brand-50 p-2 rounded-lg">
                            <input type="checkbox" id="visit-check-${shop.id}" ${isVisited ? 'checked' : ''} class="w-6 h-6 text-brand-600 rounded focus:ring-brand-500 cursor-pointer accent-red-600">
                            <label for="visit-check-${shop.id}" class="text-sm font-bold text-brand-800 cursor-pointer select-none">行ったことがある！</label>
                        </div>
                    `;

                    marker.bindPopup(popupContent);
                    marker.on('popupopen', () => {
                        const checkbox = document.getElementById(`visit-check-${shop.id}`);
                        if (checkbox) {
                            checkbox.onchange = (e) => {
                                toggleVisited(shop.id);
                                marker.setIcon(e.target.checked ? yellowIcon : redIcon);
                            };
                        }
                    });

                    markerLayer.addLayer(marker);
                    markersRef.current.set(shop.id, marker);
                });

                localMap.addLayer(markerLayer);

                return () => {
                    localMap.removeLayer(markerLayer);
                };

            }, [localMap, visitedShops, searchQuery]);

            const handleSearchSubmit = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const match = ALL_SHOPS.find(shop =>
                        shop.name.toLowerCase().includes(searchQuery.toLowerCase())
                    );

                    if (match && localMap) {
                        localMap.flyTo([match.lat, match.lng], 16, { duration: 1.5 });
                        setTimeout(() => {
                            const marker = markersRef.current.get(match.id);
                            if (marker) marker.openPopup();
                        }, 1500);
                    }
                }
            };

            const handleCurrentLocation = () => {
                if (!localMap) return;

                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition((position) => {
                        const { latitude, longitude } = position.coords;
                        localMap.flyTo([latitude, longitude], 15);

                        if (currentLocationLayer) {
                            localMap.removeLayer(currentLocationLayer);
                        }

                        const pulsingIcon = L.divIcon({
                            className: 'custom-location-icon',
                            html: `<div class="relative w-8 h-8">
                                     <div class="absolute inset-0 bg-brand-500 rounded-full animate-ping opacity-75"></div>
                                     <div class="absolute inset-0 bg-brand-600 rounded-full border-4 border-white shadow-lg"></div>
                                   </div>`,
                            iconSize: [32, 32],
                            iconAnchor: [16, 16]
                        });

                        const marker = L.marker([latitude, longitude], { icon: pulsingIcon }).addTo(localMap);
                        setCurrentLocationLayer(marker);

                    }, (error) => {
                        alert("位置情報を取得できませんでした: " + error.message);
                    });
                } else {
                    alert("お使いのブラウザは位置情報に対応していません。");
                }
            };

            return (
                <div className="relative h-screen w-full bg-stone-100 font-sans">
                    <div id="map" ref={mapRef} className="h-full w-full"></div>

                    <div className="absolute top-0 left-0 right-0 p-4 pointer-events-none z-[1000] flex flex-col md:flex-row gap-2 items-start md:items-center">
                        <div className="flex w-full md:w-auto gap-2 pointer-events-auto shadow-xl rounded-xl bg-white p-1">
                            <input
                                type="text"
                                placeholder="店名を検索..."
                                className="flex-1 md:w-80 px-4 py-3 rounded-lg border-2 border-transparent focus:border-brand-500 outline-none font-bold text-stone-700 bg-slate-50 focus:bg-white transition-colors"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                onKeyDown={handleSearchSubmit}
                            />
                        </div>
                    </div>

                    <div className="absolute bottom-6 right-6 md:bottom-10 md:right-10 z-[1000] pointer-events-auto">
                        <button
                            onClick={handleCurrentLocation}
                            className="bg-brand-600 text-white w-14 h-14 md:w-16 md:h-16 rounded-full shadow-2xl hover:bg-brand-500 hover:scale-110 active:scale-95 transition-all duration-300 flex items-center justify-center border-4 border-white"
                            title="現在地を表示"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h7" /><path d="M12 2v20" /><path d="M2 12h20" /><path d="m18 16 4 2-4 2v-4Z" /></svg>
                        </button>
                    </div>
                </div>
            );
        }

        function App() {
            const [selectedPrefecture] = useState(PREFECTURES.find(p => p.name === "東京都"));

            const [visitedShops, setVisitedShops] = useState(() => {
                const saved = localStorage.getItem('burger_visited');
                return saved ? new Set(JSON.parse(saved)) : new Set();
            });

            const toggleVisited = (id) => {
                setVisitedShops(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(id)) {
                        newSet.delete(id);
                    } else {
                        newSet.add(id);
                    }
                    localStorage.setItem('burger_visited', JSON.stringify([...newSet]));
                    return newSet;
                });
            };

            return (
                <div className="h-full w-full">
                    <MapView
                        selectedPrefecture={selectedPrefecture}
                        onBack={() => { }}
                        visitedShops={visitedShops}
                        toggleVisited={toggleVisited}
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        lucide.createIcons();
    </script>
</body>

</html>
